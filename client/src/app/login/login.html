<div style="width: 100%; height: 40vh; display: flex; justify-content: center; align-items: center;">
    <div style="display: flex; flex-direction: column; gap: 20px; width: 300px;">
        <input [(ngModel)]="email" style="padding: 10px 20px; border-radius: 5px; border: 0; background-color: whitesmoke;" type="text" placeholder="Enter your email">
        <input [(ngModel)]="password" style="padding: 10px 20px; border-radius: 5px; border: 0; background-color: whitesmoke;" type="password" placeholder="Enter your password">
        <button (click)="login()" style="background-color: black; padding: 10px 20px; border-radius: 5px; color: white; font-size: 20px; font-weight: bold; margin-top: 10px;">Continue</button>
    </div>
</div>
